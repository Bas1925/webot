<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="hl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B4FFF"/>
      <stop offset="1" stop-color="#FF6B57"/>
    </linearGradient>
    <radialGradient id="b1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#3B4FFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3B4FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FF6B57" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FF6B57" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#FBFAF6"/>
  <circle cx="1010" cy="120" r="320" fill="url(#b1)"/>
  <circle cx="1120" cy="560" r="300" fill="url(#b2)"/>

  <!-- brand lockup -->
  <g transform="translate(96,92)">
    <rect width="64" height="64" rx="16" fill="#14151A"/>
    <text x="32" y="46" font-size="38" font-weight="800" fill="#fff" text-anchor="middle">W</text>
    <text x="84" y="44" font-size="34" font-weight="800" fill="#14151A" letter-spacing="-0.5">Webot</text>
  </g>

  <!-- headline -->
  <text x="96" y="300" font-size="76" font-weight="800" fill="#14151A" letter-spacing="-2">Web, mobile &amp; <tspan fill="url(#hl)">AI</tspan> products,</text>
  <text x="96" y="386" font-size="76" font-weight="800" fill="#14151A" letter-spacing="-2">built right.</text>

  <!-- subline -->
  <text x="98" y="446" font-size="29" fill="#4a4e55">Fast websites, apps and AI for founders and teams.</text>

  <!-- language chips -->
  <g transform="translate(96,500)" font-size="26" font-weight="600">
    <rect x="0" y="0" width="118" height="52" rx="26" fill="#fff" stroke="#ECEAE3"/>
    <text x="59" y="34" fill="#3B4FFF" text-anchor="middle">English</text>
    <rect x="134" y="0" width="120" height="52" rx="26" fill="#fff" stroke="#ECEAE3"/>
    <text x="194" y="35" fill="#0f6b4f" text-anchor="middle">العربية</text>
    <rect x="274" y="0" width="118" height="52" rx="26" fill="#fff" stroke="#ECEAE3"/>
    <text x="333" y="35" fill="#FF6B57" text-anchor="middle">עברית</text>
  </g>

  <!-- footer line -->
  <text x="96" y="600" font-size="24" fill="#6b7077">webot.studio   ·   Instagram @webot2026</text>
</svg>
