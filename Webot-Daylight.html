rollIntoView({ block: 'nearest' });\n      } else if (e.key === 'Enter' && activeIdx >= 0 && visible[activeIdx]) {\n        e.preventDefault();\n        select(visible[activeIdx]);\n      }\n    });\n\n    opts().forEach((li) => {\n      li.addEventListener('click', () => select(li));\n    });\n  }\n\n  // Lead form → our backend (/api/lead → MongoDB) over fetch, so we can show an\n  // inline success/error state instead of a redirect. Idempotent across re-renders.\n  _setupForm() {\n    const form = document.getElementById('wb-lead-form');\n    if (!form || form.__wbBound) return;\n    form.__wbBound = true;\n    const T = () => Component.I18N[this.state.lang] || Component.I18N.en;\n    const digits = (s) => (String(s || '').match(/\\d/g) || []).length;\n    const isEmail = (s) => /^[^@\\s]+@[^@\\s]+\\.[a-zA-Z]{2,}$/.test(String(s || '').trim());\n\n    form.addEventListener('submit', (e) => {\n      e.preventDefault();\n      if (this.state.formStatus === 'sending') return;\n      const t = T().form;\n      const nameEl = form.querySelector('#wb-name');\n      const phoneEl = form.querySelector('#wb-phone');\n      const emailEl = form.querySelector('#wb-email');\n      const name = nameEl ? nameEl.value.trim() : '';\n      const phone = phoneEl ? phoneEl.value.trim() : '';\n      const email = emailEl ? emailEl.value.trim() : '';\n\n      if (name.length < 2) return this.setState({ formStatus: 'error', formValidationMsg: t.valName });\n      if (digits(phone) !== 10) return this.setState({ formStatus: 'error', formValidationMsg: t.valPhone });\n      if (!isEmail(email)) return this.setState({ formStatus: 'error', formValidationMsg: t.valEmail });\n\n      const fd = new FormData(form);\n      const body = Object.fromEntries(fd.entries());\n      body.lang = this.state.lang;\n      body.page = location.href;\n      this.setState({ formStatus: 'sending', formValidationMsg: '' });\n      fetch(form.action, {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },\n        body: JSON.stringify(body),\n      })\n        .then((r) => this.setState({ formStatus: r.ok ? 'success' : 'error', formValidationMsg: r.ok ? '' : t.errorMsg }))\n        .catch(() => this.setState({ formStatus: 'error', formValidationMsg: t.errorMsg }));\n    });\n  }\n\n  // Keyboard support + focus management for the mobile menu dialog.\n  _setupMenuA11y() {\n    this._menuWasOpen = this.state.menuOpen;\n    // close the language dropdown when tapping anywhere outside it\n    this._onDocClick = (e) => {\n      if (!this.state.langOpen) return;\n      const ui = document.querySelector('[data-mobile-ui]');\n      if (ui && !ui.contains(e.target)) this.setState({ langOpen: false });\n    };\n    document.addEventListener('click', this._onDocClick);\n    this._onMenuKey = (e) => {\n      if (!this.state.menuOpen) return;\n      if (e.key === 'Escape') { e.preventDefault(); this.setState({ menuOpen: false }); return; }\n      if (e.key === 'Tab') {\n        const sheet = document.getElementById('wb-mobile-menu');\n        if (!sheet) return;\n        const f = [...sheet.querySelectorAll('a[href],button:not([disabled]),[tabindex]:not([tabindex=\"-1\"])')].filter(el => el.offsetParent !== null);\n        if (!f.length) return;\n        const first = f[0], last = f[f.length - 1];\n        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }\n        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }\n      }\n    };\n    document.addEventListener('keydown', this._onMenuKey);\n  }\n\n  // When the sheet opens, move focus into it; when it closes, return focus to the burger.\n  _applyMenuA11y() {\n    const open = this.state.menuOpen;\n    if (open === this._menuWasOpen) return;\n    if (open) {\n      this._menuReturnFocus = document.activeElement;\n      const sheet = document.getElementById('wb-mobile-menu');\n      const f = sheet && sheet.querySelector('button,a[href]');\n      if (f && f.focus) f.focus();\n    } else {\n      const back = (this._menuReturnFocus && this._menuReturnFocus.focus) ? this._menuReturnFocus : document.querySelector('[data-burger]');\n      if (back && back.focus) back.focus();\n    }\n    this._menuWasOpen = open;\n  }\n\n  _setupGallery() {\n    const rows = [...document.querySelectorAll('[data-prx]')];\n    const section = document.querySelector('[data-gallery]');\n    if (!rows.length || !section) return;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const BASE = -360, RANGE = 180;\n    const apply = (t) => {\n      rows.forEach(r => {\n        const dir = parseFloat(r.getAttribute('data-dir')) || 1;\n        r.style.transform = 'translateX(' + (BASE + dir * t * RANGE) + 'px)';\n      });\n    };\n    if (reduce) { apply(0); return; }\n    const update = () => {\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      const rect = section.getBoundingClientRect();\n      let p = (vh - rect.top) / (vh + rect.height);\n      p = Math.max(0, Math.min(1, p));\n      apply((p - 0.5) * 2);\n    };\n    update();\n    window.addEventListener('scroll', update, { passive: true });\n    window.addEventListener('resize', update, { passive: true });\n    this._galleryUpdate = update;\n  }\n\n  _setupReveal() {\n    const items = document.querySelectorAll('[data-reveal]');\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    if (reduce) {\n      items.forEach(el => { el.__shown = true; });\n      return;\n    }\n\n    items.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(24px)';\n      el.style.willChange = 'opacity, transform';\n    });\n\n    this._revealItems = items;\n    const easeOut = (t) => 1 - Math.pow(1 - t, 3);\n    const tween = (el, delay) => {\n      const dur = 620;\n      el.style.setProperty('transition', 'none', 'important');\n      const start = Date.now() + delay;\n      const step = () => {\n        const t = Math.min(1, Math.max(0, (Date.now() - start) / dur));\n        const e = easeOut(t);\n        el.style.setProperty('opacity', String(e), 'important');\n        el.style.setProperty('transform', 'translateY(' + (24 * (1 - e)) + 'px)', 'important');\n        if (t < 1) { setTimeout(step, 16); }\n        else {\n          el.style.setProperty('opacity', '1');\n          el.style.setProperty('transform', 'none');\n          el.style.removeProperty('transition');\n          el.style.willChange = 'auto';\n        }\n      };\n      setTimeout(step, 0);\n    };\n    const reveal = (el) => {\n      if (el.__shown) return;\n      el.__shown = true;\n      tween(el, parseInt(el.getAttribute('data-delay') || '0', 10));\n    };\n    const check = () => {\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      items.forEach(el => {\n        if (el.__shown) return;\n        const r = el.getBoundingClientRect();\n        if (r.top < vh * 0.94 && r.bottom > 0) reveal(el);\n      });\n    };\n    check(); setTimeout(check, 60); setTimeout(check, 240);\n    window.addEventListener('scroll', check, { passive: true });\n    window.addEventListener('resize', check, { passive: true });\n    this._revealCheck = check;\n\n    setTimeout(() => { items.forEach(el => reveal(el)); }, 1800);\n  }\n\n  _setupNav() {\n    const nav = document.querySelector('[data-nav]');\n    const onScroll = () => {\n      if (!nav) return;\n      if (window.scrollY > 20) {\n        nav.style.background = 'rgba(251,250,246,.8)';\n        nav.style.backdropFilter = 'blur(16px)';\n        nav.style.webkitBackdropFilter = 'blur(16px)';\n        nav.style.borderBottomColor = '#ECEAE3';\n        nav.style.boxShadow = '0 6px 24px -18px rgba(20,21,26,.4)';\n      } else {\n        nav.style.background = 'transparent';\n        nav.style.backdropFilter = 'none';\n        nav.style.webkitBackdropFilter = 'none';\n        nav.style.borderBottomColor = 'transparent';\n        nav.style.boxShadow = 'none';\n      }\n    };\n    onScroll();\n    window.addEventListener('scroll', onScroll, { passive: true });\n    this._onScroll = onScroll;\n  }\n\n  _setupResponsive() {\n    const desktop = document.querySelector('[data-desktop-nav]');\n    const burger = document.querySelector('[data-burger]');\n    const apply = () => {\n      const mobile = window.innerWidth < 900;\n      if (desktop) desktop.style.display = mobile ? 'none' : 'flex';\n      if (burger) burger.style.display = mobile ? 'flex' : 'none';\n      const mobileUi = document.querySelector('[data-mobile-ui]');\n      if (mobileUi) mobileUi.style.display = mobile ? 'flex' : 'none';\n      const footerGrid = document.querySelector('footer > div > div');\n      if (footerGrid) footerGrid.style.gridTemplateColumns = window.innerWidth < 720 ? '1fr 1fr' : '1.4fr repeat(3,1fr)';\n      const track = document.querySelector('[data-process-track]');\n      if (track) track.style.display = window.innerWidth < 1040 ? 'none' : 'block';\n    };\n    apply();\n    window.addEventListener('resize', apply, { passive: true });\n    this._applyResponsive = apply;\n  }\n\n  componentDidUpdate() {\n    this._applyLang();\n    this._applyMenuA11y();\n    this._setupForm();\n    this._setupCountryPicker();\n    if (this._applyResponsive) this._applyResponsive();\n    if (this._revealCheck) this._revealCheck();\n    if (this._revealItems) {\n      this._revealItems.forEach(el => {\n        if (el.__shown) { el.style.opacity = '1'; el.style.transform = 'none'; }\n      });\n    }\n  }\n\n  componentWillUnmount() {\n    ['_revealCheck', '_onScroll', '_applyResponsive', '_galleryUpdate'].forEach(k => {\n      if (this[k]) { window.removeEventListener('scroll', this[k]); window.removeEventListener('resize', this[k]); }\n    });\n    if (this._onMenuKey) document.removeEventListener('keydown', this._onMenuKey);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
